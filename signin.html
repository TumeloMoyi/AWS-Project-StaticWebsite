<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In - Baía</title>
  <link rel="stylesheet" href="css/style.css"/>

  <!-- AWS Cognito SDK -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/amazon-cognito-identity-js/6.3.9/amazon-cognito-identity.min.js"></script>

</head>
<body>

<header>
  <nav>
    <h1>Baía</h1>

    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="booking.html">Booking</a></li>
      <li><a href="order.html">Order</a></li>
      <li><a href="signin.html">Sign In</a></li>
    </ul>
  </nav>
</header>

<section class="section">

  <h2>Customer Login</h2>

  <form id="loginForm">

    <input
      type="email"
      id="email"
      placeholder="Email Address"
      required
    >

    <input
      type="password"
      id="password"
      placeholder="Password"
      required
    >

    <button type="submit">
      Sign In
    </button>

  </form>

  <br>

  <form id="registerForm">

    <h2>Create Account</h2>

    <input
      type="email"
      id="registerEmail"
      placeholder="Email Address"
      required
    >

    <input
      type="password"
      id="registerPassword"
      placeholder="Password"
      required
    >

    <button type="submit">
      Register
    </button>

  </form>

</section>

<footer>
  <p>© 2026 Baía Seafood Restaurant</p>
</footer>

<script src="aws/cognito-config.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
