<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8"/>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Sign In - Baía</title>

  <link
    rel="stylesheet"
    href="css/style.css"
  />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/amazon-cognito-identity-js/6.3.9/amazon-cognito-identity.min.js"></script>

</head>

<body>


<header>

  <nav>

    <h1>Baía</h1>

    <ul>

      <li><a href="index.html">Home</a></li>

      <li><a href="menu.html">Menu</a></li>

      <li><a href="booking.html">Booking</a></li>

      <li><a href="order.html">Order</a></li>

      <li><a href="signin.html">Sign In</a></li>

    </ul>

  </nav>

</header>


<section class="page-hero">

  <div class="page-overlay">

    <h1>Customer Access</h1>

    <p>
      Sign in or create an account to manage reservations and orders.
    </p>

  </div>

</section>


<section class="signin-section">


  <!-- LOGIN -->

  <div class="signin-card">

    <h2>Sign In</h2>

    <form id="loginForm">

      <input
        type="email"
        id="email"
        placeholder="Email Address"
        required
      >

      <input
        type="password"
        id="password"
        placeholder="Password"
        required
      >

      <button type="submit">
        Sign In
      </button>

    </form>

  </div>


  <!-- REGISTER -->

  <div class="signin-card">

    <h2>Create Account</h2>

    <form id="registerForm">

      <input
        type="email"
        id="registerEmail"
        placeholder="Email Address"
        required
      >

      <input
        type="password"
        id="registerPassword"
        placeholder="Password"
        required
      >

      <button type="submit">
        Register
      </button>

    </form>

  </div>

</section>


<footer>

  <p>
    © 2026 Baía Seafood Restaurant
  </p>

</footer>

<script src="aws/cognito-config.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
